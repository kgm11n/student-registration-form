<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Student Registration Form</h1>
            <form id="registrationForm">
                <!-- Personal Information Section -->
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                        <span class="error" id="firstNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                        <span class="error" id="lastNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
                        <span class="error" id="phoneError"></span>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required>
                        <span class="error" id="dobError"></span>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">-- Select Gender --</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <span class="error" id="genderError"></span>
                    </div>
                </fieldset>

                <!-- Academic Information Section -->
                <fieldset>
                    <legend>Academic Information</legend>

                    <div class="form-group">
                        <label for="studentId">Student ID *</label>
                        <input type="text" id="studentId" name="studentId" placeholder="e.g., STU001" required>
                        <span class="error" id="studentIdError"></span>
                    </div>

                    <div class="form-group">
                        <label for="program">Program of Study *</label>
                        <select id="program" name="program" required>
                            <option value="">-- Select Program --</option>
                            <option value="engineering">Engineering</option>
                            <option value="business">Business Administration</option>
                            <option value="arts">Arts & Sciences</option>
                            <option value="medicine">Medicine</option>
                            <option value="law">Law</option>
                        </select>
                        <span class="error" id="programError"></span>
                    </div>

                    <div class="form-group">
                        <label for="year">Year of Study *</label>
                        <select id="year" name="year" required>
                            <option value="">-- Select Year --</option>
                            <option value="1">First Year</option>
                            <option value="2">Second Year</option>
                            <option value="3">Third Year</option>
                            <option value="4">Fourth Year</option>
                        </select>
                        <span class="error" id="yearError"></span>
                    </div>

                    <div class="form-group">
                        <label for="gpa">Current GPA</label>
                        <input type="number" id="gpa" name="gpa" min="0" max="4" step="0.01" placeholder="0.00 - 4.00">
                        <span class="error" id="gpaError"></span>
                    </div>
                </fieldset>

                <!-- Contact Information Section -->
                <fieldset>
                    <legend>Contact Information</legend>

                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <input type="text" id="address" name="address" required>
                        <span class="error" id="addressError"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                            <span class="error" id="cityError"></span>
                        </div>

                        <div class="form-group">
                            <label for="state">State/Province *</label>
                            <input type="text" id="state" name="state" required>
                            <span class="error" id="stateError"></span>
                        </div>

                        <div class="form-group">
                            <label for="zip">Zip/Postal Code *</label>
                            <input type="text" id="zip" name="zip" required>
                            <span class="error" id="zipError"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="country">Country *</label>
                        <input type="text" id="country" name="country" required>
                        <span class="error" id="countryError"></span>
                    </div>
                </fieldset>

                <!-- Additional Information Section -->
                <fieldset>
                    <legend>Additional Information</legend>

                    <div class="form-group">
                        <label for="interests">Areas of Interest</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="interests" value="research"> Research</label>
                            <label><input type="checkbox" name="interests" value="internship"> Internship</label>
                            <label><input type="checkbox" name="interests" value="exchange"> Exchange Program</label>
                            <label><input type="checkbox" name="interests" value="volunteer"> Volunteer Work</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comments">Additional Comments</label>
                        <textarea id="comments" name="comments" rows="4" placeholder="Any additional information..."></textarea>
                    </div>

                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                            I agree to the terms and conditions *
                        </label>
                        <span class="error" id="agreeTermsError"></span>
                    </div>
                </fieldset>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">Register</button>
                    <button type="reset" class="btn btn-reset">Clear Form</button>
                </div>
            </form>

            <!-- Success Message -->
            <div id="successMessage" class="success-message" style="display:none;">
                <h2>Registration Successful!</h2>
                <p>Thank you for registering. Your application has been received.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
